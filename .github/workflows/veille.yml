name: Agent Veille Tech

on:
  schedule:
    - cron: '0 7 * * *'  # Chaque matin à 7h UTC
  workflow_dispatch:       # Bouton pour lancer manuellement

jobs:
  veille:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests beautifulsoup4 groq python-dotenv

      - name: Lancer l'agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          DESTINATAIRE: ${{ secrets.DESTINATAIRE }}
        run: python agent_veille.py
